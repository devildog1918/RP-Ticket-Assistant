<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Field Tech App</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f172a"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
    }
    .app {
      max-width: 420px;
      margin: auto;
      background: white;
      min-height: 100vh;
    }
    header {
      background: #0f172a;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }
    .content {
      padding: 15px;
    }
    .ticket {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }
    #installBtn {
      display: none;
    }
  </style>
</head>

<body>
<div class="app">
  <header>Field Tech App</header>
  <div class="content" id="app"></div>
  <div class="content">
    <button class="btn" id="installBtn">Install App</button>
  </div>
</div>

<script>
let tickets = [
  {
    id: "I2604-01234",
    user: "John Smith",
    campus: "MRHS",
    issue: "Projector not working",
    status: "In Progress",
    notes: []
  }
];

let current = "list";
let selected = null;
let deferredPrompt = null;

function render() {
  const app = document.getElementById("app");

  if (current === "list") {
    app.innerHTML = tickets.map(t => `
      <div class="ticket" onclick="openTicket('${t.id}')">
        <b>${t.id}</b><br>
        ${t.user}<br>
        ${t.campus}<br>
        ${t.issue}<br>
        <small>${t.status}</small>
      </div>
    `).join("");
  }

  if (current === "detail") {
    const t = selected;
    app.innerHTML = `
      <h3>${t.id}</h3>
      ${t.user}<br>
      ${t.campus}<br>
      ${t.issue}<br><br>

      <button class="btn" onclick="addNote('On Site')">On Site</button>
      <button class="btn" onclick="addNote('Contacted')">Contacted</button>
      <button class="btn" onclick="addNote('Resolved')">Resolved</button>
      <button class="btn" onclick="goBack()">Back</button>
    `;
  }
}

function openTicket(id) {
  selected = tickets.find(t => t.id === id);
  current = "detail";
  render();
}

function goBack() {
  current = "list";
  render();
}

function addNote(type) {
  let text = "";

  if (type === "On Site") text = "Technician arrived on site.";
  if (type === "Contacted") text = "User contacted.";
  if (type === "Resolved") {
    text = "Issue resolved.";
    selected.status = "Resolved";
  }

  selected.notes.push(text);
  alert("Update saved");
  render();
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      await navigator.serviceWorker.register("./service-worker.js");
      console.log("Service worker registered");
    } catch (err) {
      console.error("Service worker registration failed:", err);
    }
  });
}

const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
  console.log("Install ready");
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;
  console.log("Install choice:", choice.outcome);

  deferredPrompt = null;
  installBtn.style.display = "none";
});

window.addEventListener("appinstalled", () => {
  console.log("App installed");
  installBtn.style.display = "none";
});
</script>
</body>
</html>
